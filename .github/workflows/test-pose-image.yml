name: Test Pose Image Feature

on:
  push:
    branches: [ main ]
    paths:
      - 'ros2_ws/src/brain/brain_client/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ros2_ws/src/brain/brain_client/**'
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install ROS2
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common curl
        sudo add-apt-repository universe -y
        sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y ros-humble-ros-base python3-colcon-common-extensions
    
    - name: Install dependencies
      run: |
        source /opt/ros/humble/setup.bash
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio numpy opencv-python pydantic
    
    - name: Run tests
      working-directory: ros2_ws/src/brain/brain_client
      run: |
        source /opt/ros/humble/setup.bash
        python -m pytest tests/test_pose_image_feature.py -v
