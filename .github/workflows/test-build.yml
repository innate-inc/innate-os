name: Test Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-build:
    runs-on: selfhosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check system resources
        run: |
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h
          echo "=== Docker info ==="
          docker system df

      - name: Build test image
        run: |
          docker build --progress=plain -t innate-os-test -f Dockerfile.test . 2>&1

      - name: Run basic tests
        run: |
          docker run --rm innate-os-test bash -c "
            source /opt/ros/humble/setup.bash
            source /root/innate-os/ros2_ws/install/setup.bash
            echo 'Listing available packages...'
            ros2 pkg list 2>/dev/null | head -20 || true
            echo 'Build verification complete!'
          "

      - name: Cleanup
        if: always()
        run: |
          docker rmi innate-os-test || true
