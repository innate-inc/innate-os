[package]
name = "mars_control_rust"
version = "0.1.0"
edition = "2021"
publish = false
description = "Rust implementation of app.py node using rclrs"

[dependencies]
rclrs = "0.6"
# Note: this is NOT from crates.io. It's generated by rosidl_generator_rs in your colcon workspace.
std_msgs = "*"
geometry_msgs = "*"

[package.metadata.ros]
# Install launch files into share/ so `ros2 launch` can find them
install_to_share = ["launch"]
