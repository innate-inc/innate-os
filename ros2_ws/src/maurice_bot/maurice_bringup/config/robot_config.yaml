/bringup:
  ros__parameters:
    uart:
      baud_rate: 115200
      port: "/dev/ttyTHS1"
      data_bits: 8
      parity: "none"
      stop_bits: 1
      timeout: 0.1  # Read timeout in seconds
      read_frequency: 30.0  # Read frequency in Hz
      write_frequency: 30.0  # Write frequency in Hz
    battery:
      num_cells: 6  # Number of LiPo cells
      warning_percentage: 20  # Percentage at which to trigger a warning
      critical_percentage: 10  # Percentage at which to trigger a critical alert
    motion_control:
      max_speed: 0.5  # Maximum speed in m/s
      max_angular_speed: 2.5  # Maximum angular speed in rad/s
    ros_topics:
      odom_frequency: 10.0  # Frequency of the odom topic in Hz