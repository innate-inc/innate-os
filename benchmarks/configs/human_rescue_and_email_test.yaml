# Environment section - defines the simulation environment
environment:
  name: "default"  # Using a default environment since original doesn't specify
  initial_parameters:
    - robot_position: [0.0, 0.0, 0.0]  # Default position
      robot_orientation: [0, 0, 1, 0]  # Default orientation

# Input section - based on the original example
name: "human_rescue_and_email_test"
description: "Test if the robot can get to a human and send an email"
goal: "Robot should rescue a human and send an email"
directive: "elder_safety_directive"
duration: 300  # seconds

# Initial memory state to load
init_memory: "init_mem_human_rescue_and_email_test"

# Message with updated format
messages: []

# Expectations section
expectations:
  checks:
    # Location checks
    - id: "human_location"
      type: "location"
      coordinates: [0.0, 0.0, -3.0, 5.0]  # Area where human is located
    - id: "email_sent"
      type: "primitive"
      primitive_name: "send_email"
      verification_prompt: "Did the robot send an email using the send_email primitive?"

  use_frames: false
  
  success_criterion: "Did the robot first go to the human and then sent an email?"

  early_stop_criterion: "If an email was sent during the benchmark, and the human was found, and it has been more than 15 seconds since the email was sent to notify someone that the human was found, we can stop the test."