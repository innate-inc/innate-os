# Environment section - defines the simulation environment
environment:
  name: "default"  # Using a default environment since original doesn't specify
  initial_parameters:
    - robot_position: [0.0, 0.0, 0.0]  # Default position
      robot_orientation: [0, 0, 1, 0]  # Default orientation

# Input section - based on the original example
name: "quick_response_test"
description: "Test if the robot responds quickly to a simple directive"
goal: "Robot should respond within 10 seconds and only respond once"
directive: "default_directive"
duration: 300  # seconds

# Message with updated format
messages:
  - trigger_type: "time"
    time: 10  # seconds after start
    text: "Hello how are you?"

# Expectations section
expectations:
  use_frames: false
  
  success_criterion: "Did the robot respond to the 'Hello how are you?' message exactly once and within 10 seconds of receiving it and only respond once?"

  early_stop_criterion: "If it has been more than 60 seconds since the hello message was sent, we can stop the test." 