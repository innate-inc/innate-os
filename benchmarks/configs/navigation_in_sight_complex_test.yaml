# Environment section - defines the simulation environment
environment:
  name: "default"  # Using a default environment
  initial_parameters:
    # User will define the starting position
    - robot_position: [1, 2, 0.25]  # Starting in a different room
      robot_orientation: [0, 0, 1, 0] # Default orientation

# Input section
name: "navigation_in_sight_to_tv_complex_test"
description: "Test if the robot can navigate from a different room to the TV using only navigation_in_sight primitive, based on a single initial instruction."
goal: "Robot should navigate from a different room to the vicinity of the TV by repeatedly calling navigation_in_sight and never using navigation_history, after being told once to go to the other room and navigate to the TV."
directive: "empty_directive" # Simple, direct instruction
duration: 500  # seconds, increased duration for a more complex task

# Messages - Single instruction to go to another room and find the TV
messages:
  - trigger_type: "time"
    time: 2  # seconds after start
    text: "Find the TV in the house and stop directly under it. ONLY STOP WHEN YOU ARE DIRECTLY UNDER THE TV, less than 1 meter away from the TV."

# Expectations section
expectations:
  checks:
    - id: "reached_tv_area"
      type: "location"
      description: "Check if robot reached the area near the TV"
      # User needs to define the coordinates for the area near the TV
      # Example: if TV is around x=5, y=-2
      coordinates: [0, -2.0, 4, -20.0]
      verification_prompt: "Did the robot reach the area near the TV?"

  use_frames: true

  # Success criterion - what the robot needs to achieve to succeed
  success_criterion: "Did the robot successfully navigate to the TV and stop around it? The robot should be positioned close to the TV coordinates. It is not necessary to stop directly under the TV as long as it is close to it."

  # Early stop criterion - conditions that should end the benchmark early
  early_stop_criterion: "Should this benchmark be stopped early? Stop if the robot appears to be stuck in the same location for more than 120 seconds, is moving in circles without making progress for more than 120 seconds, or if it's clear the robot cannot complete the navigation task. DO NOT STOP TOO EARLY, ONLY IF YOU ARE REALLY SURE." 
