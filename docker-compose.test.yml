services:
  integration-test:
    image: ${INNATE_TEST_IMAGE:-innate-os-test:latest}
    container_name: innate-integration-test
    environment:
      - INNATE_OS_ROOT=/root/innate-os
      - SKIP_UPDATE_CHECK=1
      - ZENOH_ROUTER_CONFIG_URI=/root/innate-os/zenoh_test_config.json5
      - RMW_ZENOH_CONFIG_FILE=/root/innate-os/zenoh_test_config.json5

    shm_size: "2g"
    volumes:
      - ./zenoh_test_config.json5:/root/innate-os/zenoh_test_config.json5:ro
    # Test image already contains ros2_ws, skills, and agents from Dockerfile.test.
    # Rebuild once in-container to keep behavior aligned with current test workflow.
    command: >
      zsh -lc '
        set -e
        cleanup() {
          if [ -n "$$ROUTER_PID" ]; then
            kill "$$ROUTER_PID" >/dev/null 2>&1 || true
            wait "$$ROUTER_PID" >/dev/null 2>&1 || true
          fi
        }
        trap cleanup EXIT
        cd /root/innate-os/ros2_ws &&
        colcon build &&
        source install/setup.zsh &&
        ros2 run rmw_zenoh_cpp rmw_zenohd &
        ROUTER_PID=$$! &&
        sleep 2 &&
        colcon test --packages-select brain_client --ctest-args -R "test_skill_integration|test_pose_image" --event-handlers console_direct+ &&
        colcon test-result --verbose
      '
